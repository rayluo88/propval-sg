services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "7860:7860"
    depends_on:
      - api
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
